name: MacCleaner
options:
  bundleIdPrefix: com.dong
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  MacCleaner:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: Resources/Assets.xcassets
      - path: Resources
        buildPhase: resources
        type: folder
        excludes:
          - "Assets.xcassets"
          - "Assets.xcassets/**"
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dong.MacCleaner
        PRODUCT_NAME: MacCleaner
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Đông"
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "13.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MacCleanerHelper:
    type: tool
    platform: macOS
    sources:
      - path: PrivilegedHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dong.MacCleaner.Helper
        PRODUCT_NAME: com.dong.MacCleaner.Helper
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
        INSTALL_PATH: /Library/PrivilegedHelperTools

  DownloadsLister:
    type: application
    platform: macOS
    sources:
      - path: Phase0/DownloadsLister
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dong.MacCleaner.Phase0.DownloadsLister
        PRODUCT_NAME: DownloadsLister
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Đông"
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "13.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
