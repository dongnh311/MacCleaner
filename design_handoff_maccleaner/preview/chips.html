<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>chips</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Filter chips · toolbar pills</div>
  <div class="row" style="gap: 8px; flex-wrap: wrap;">
    <span class="chip" style="background: rgba(107,82,245,0.18); color: #FFFFFF; border-color: rgba(107,82,245,0.40);">All <span class="mono" style="color: var(--fg-tertiary);">128</span></span>
    <span class="chip">Caches <span class="mono" style="color: var(--fg-tertiary);">42</span></span>
    <span class="chip">Logs <span class="mono" style="color: var(--fg-tertiary);">18</span></span>
    <span class="chip">Xcode <span class="mono" style="color: var(--fg-tertiary);">7</span></span>
    <span class="chip">Homebrew <span class="mono" style="color: var(--fg-tertiary);">3</span></span>
  </div>
  <div class="label">Selected chip = filled tint of section accent. Counts in mono, tertiary.</div>
</div></body></html>
