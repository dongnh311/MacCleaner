<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>action-bar</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding: 0; justify-content: flex-end;">
  <div style="margin-top: auto; padding: 12px 16px; background: rgba(0,0,0,0.25); border-top: 0.5px solid var(--separator); display: flex; align-items: center; gap: 10px;">
    <input type="checkbox" checked style="accent-color: var(--brand-accent);">
    <span class="label" style="color: var(--fg-primary);">12 of 128 selected</span>
    <span class="num-md" style="color: var(--fg-tertiary);">· 7.4 GB</span>
    <div class="spacer"></div>
    <button style="background: transparent; color: var(--fg-secondary); border: 0.5px solid var(--border-default); padding: 5px 12px; border-radius: 6px; font: 500 13px var(--font-sans);">Reveal</button>
    <button style="background: var(--color-warning); color: #000; border: none; padding: 5px 14px; border-radius: 6px; font: 500 13px var(--font-sans);">Clean selected</button>
  </div>
</div></body></html>
