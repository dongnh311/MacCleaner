<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>colors-threshold</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Threshold tints · Color.percentTint(_:)</div>
  <div class="row" style="gap: 10px; align-items: stretch;">
    <div class="col" style="flex: 1; gap: 6px; padding: 12px; border-radius: 8px; background: rgba(48,209,88,0.10); border: 0.5px solid rgba(48,209,88,0.35);">
      <div class="row" style="justify-content: space-between;"><span class="label" style="color:#30D158;">Healthy</span><span class="num-md" style="color:#30D158;">&lt; 60%</span></div>
      <div style="height: 6px; background: rgba(48,209,88,0.25); border-radius: 3px; overflow: hidden;"><div style="width: 38%; height: 100%; background: #30D158;"></div></div>
    </div>
    <div class="col" style="flex: 1; gap: 6px; padding: 12px; border-radius: 8px; background: rgba(255,159,10,0.10); border: 0.5px solid rgba(255,159,10,0.35);">
      <div class="row" style="justify-content: space-between;"><span class="label" style="color:#FF9F0A;">Elevated</span><span class="num-md" style="color:#FF9F0A;">60–85%</span></div>
      <div style="height: 6px; background: rgba(255,159,10,0.25); border-radius: 3px; overflow: hidden;"><div style="width: 72%; height: 100%; background: #FF9F0A;"></div></div>
    </div>
    <div class="col" style="flex: 1; gap: 6px; padding: 12px; border-radius: 8px; background: rgba(255,69,58,0.10); border: 0.5px solid rgba(255,69,58,0.35);">
      <div class="row" style="justify-content: space-between;"><span class="label" style="color:#FF453A;">Critical</span><span class="num-md" style="color:#FF453A;">≥ 85%</span></div>
      <div style="height: 6px; background: rgba(255,69,58,0.25); border-radius: 3px; overflow: hidden;"><div style="width: 93%; height: 100%; background: #FF453A;"></div></div>
    </div>
  </div>
</div></body></html>
