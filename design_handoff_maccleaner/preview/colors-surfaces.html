<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>colors-surfaces</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background: #1E2230;">
  <div class="eyebrow">Surfaces (dark)</div>
  <div class="row" style="gap: 10px;">
    <div class="col" style="gap: 4px; flex: 1;"><div style="height: 48px; background: #15181F; border-radius: 8px; border: 0.5px solid var(--border-hairline);"></div><div class="label">Sunken</div><div class="token">#15181F</div></div>
    <div class="col" style="gap: 4px; flex: 1;"><div style="height: 48px; background: #1E2230; border-radius: 8px; border: 0.5px solid var(--border-hairline);"></div><div class="label">Window</div><div class="token">#1E2230</div></div>
    <div class="col" style="gap: 4px; flex: 1;"><div style="height: 48px; background: #21263A; border-radius: 8px; border: 0.5px solid var(--border-hairline);"></div><div class="label">Tinted</div><div class="token">#21263A</div></div>
    <div class="col" style="gap: 4px; flex: 1;"><div style="height: 48px; background: #2A2F3E; border-radius: 8px; border: 0.5px solid var(--border-default);"></div><div class="label">Card</div><div class="token">#2A2F3E</div></div>
    <div class="col" style="gap: 4px; flex: 1;"><div style="height: 48px; background: #303548; border-radius: 8px; border: 0.5px solid var(--border-default);"></div><div class="label">Hover</div><div class="token">#303548</div></div>
    <div class="col" style="gap: 4px; flex: 1;"><div style="height: 48px; background: #2F3447; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.35);"></div><div class="label">Elevated</div><div class="token">#2F3447</div></div>
  </div>
</div></body></html>
