<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>type-scale</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="col" style="gap: 8px;">
    <div style="font: 600 28px/1.1 var(--font-sans); letter-spacing: -0.01em;">Display · 28 / 600</div>
    <div style="font: var(--type-title-lg);">Title large · 22 / 600 — module header</div>
    <div style="font: var(--type-title-md);">Title medium · 17 / 600</div>
    <div style="font: var(--type-title-sm);">TITLE SMALL · 13 / 600</div>
    <div style="font: var(--type-body-lg);">Body large · 15 / 400 — running text</div>
    <div style="font: var(--type-body-md); color: var(--fg-secondary);">Body medium · 13 / 400 — list rows, secondary copy</div>
    <div style="font: var(--type-body-sm); color: var(--fg-tertiary);">Caption · 11 / 400 — paths, timestamps, metadata</div>
  </div>
</div></body></html>
