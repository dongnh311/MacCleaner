<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>list-row</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding: 14px;">
  <div class="eyebrow" style="padding: 0 6px;">List row · selected + hover + default</div>
  <div class="col" style="gap: 2px;">
    <div class="row" style="padding: 8px 10px; border-radius: 8px; background: rgba(107,82,245,0.14); border-left: 3px solid var(--brand-accent); padding-left: 9px;">
      <input type="checkbox" checked style="accent-color: var(--brand-accent);">
      <span style="color: var(--brand-accent);">📁</span>
      <span class="value">DerivedData</span>
      <span class="path" style="flex: 1; max-width: 280px;">~/Library/Developer/Xcode</span>
      <span class="num-md">4.21 GB</span>
    </div>
    <div class="row" style="padding: 8px 10px; border-radius: 8px; background: var(--surface-card-hover);">
      <input type="checkbox" style="accent-color: var(--brand-accent);">
      <span style="color: var(--fg-tertiary);">📁</span>
      <span class="value">Module Cache</span>
      <span class="path" style="flex: 1; max-width: 280px;">~/Library/Caches/clang</span>
      <span class="num-md">812 MB</span>
    </div>
    <div class="row" style="padding: 8px 10px; border-radius: 8px;">
      <input type="checkbox" style="accent-color: var(--brand-accent);">
      <span style="color: var(--fg-tertiary);">📁</span>
      <span class="value">Simulator devices</span>
      <span class="path" style="flex: 1; max-width: 280px;">~/Library/Developer/CoreSimulator/Devices</span>
      <span class="num-md">2.6 GB</span>
    </div>
  </div>
</div></body></html>
