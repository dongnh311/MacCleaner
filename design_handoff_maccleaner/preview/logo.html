<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>logo</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background: radial-gradient(120% 100% at 20% 0%, rgba(107,82,245,0.18), transparent 60%), var(--surface-window); flex-direction: row; align-items: center; gap: 24px;">
  <img src="../assets/AppIcon-256.png" width="120" height="120" style="image-rendering: -webkit-optimize-contrast;" alt="">
  <div class="col" style="gap: 8px;">
    <div class="eyebrow">App icon</div>
    <div style="font: 600 28px/1.1 var(--font-sans); letter-spacing: -0.01em;">MacCleaner</div>
    <div class="label">Programmatic sparkle · violet→blue gradient · transparent canvas</div>
    <div class="row" style="gap: 6px; margin-top: 4px;">
      <span class="chip mono" style="font-size: 11px;">128</span>
      <span class="chip mono" style="font-size: 11px;">256</span>
      <span class="chip mono" style="font-size: 11px;">512</span>
      <span class="chip mono" style="font-size: 11px;">1024</span>
    </div>
  </div>
</div></body></html>
