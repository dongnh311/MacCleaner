<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>colors-brand</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Brand</div>
  <div class="row" style="gap: 14px; flex-wrap: wrap;">
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #6B52F5;"></div>
      <div class="label" style="color: var(--fg-primary);">Accent</div>
      <div class="token">#6B52F5</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #5C44E8;"></div>
      <div class="label" style="color: var(--fg-primary);">Hover</div>
      <div class="token">#5C44E8</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #4F38D6;"></div>
      <div class="label" style="color: var(--fg-primary);">Pressed</div>
      <div class="token">#4F38D6</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #199EF5;"></div>
      <div class="label" style="color: var(--fg-primary);">Gradient end</div>
      <div class="token">#199EF5</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: linear-gradient(135deg,#6B52F5,#199EF5);"></div>
      <div class="label" style="color: var(--fg-primary);">Gradient</div>
      <div class="token">brand-gradient</div>
    </div></div>
</div></body></html>
