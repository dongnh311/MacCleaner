<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>menubar-strip</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="background: #0E1018; padding: 0; gap: 0;">
  <div style="padding: 10px 12px; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.92); font: var(--type-num-md);">
    <span style="display:inline-flex; align-items: center; gap: 4px;"><span style="color:#6B52F5;">✦</span> <span style="color: var(--fg-tertiary);">CPU</span> 38%</span>
    <span><span style="color: var(--fg-tertiary);">RAM</span> 12.4G</span>
    <span><span style="color: var(--fg-tertiary);">GPU</span> 14%</span>
    <span style="color:#FF9F0A;"><span style="color: var(--fg-tertiary);">°</span> 72°</span>
    <span><span style="color: var(--fg-tertiary);">↓</span> 47K</span>
    <span><span style="color: var(--fg-tertiary);">↑</span> 9K</span>
    <span style="color:#30D158;">86%</span>
  </div>
  <div class="label" style="padding: 0 12px 10px;">Menu-bar agent · mono SF, tabular nums, refreshes every 1 s.</div>
</div></body></html>
