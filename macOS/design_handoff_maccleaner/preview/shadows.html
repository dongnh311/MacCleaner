<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>shadows</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Shadow + elevation</div>
  <div class="row" style="gap: 18px; padding: 20px 4px 24px;">
    <div style="flex:1; height: 64px; background: var(--surface-card); border-radius: 10px; border: 0.5px solid var(--border-hairline); box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: grid; place-items: center;" class="label">card · 0 1 4 / .05</div>
    <div style="flex:1; height: 64px; background: var(--surface-elevated); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.04) inset; display: grid; place-items: center;" class="label">popover · 0 8 24 / .25</div>
    <div style="flex:1; height: 64px; background: var(--surface-elevated); border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); display: grid; place-items: center;" class="label">elevated · 0 12 40 / .35</div>
  </div>
</div></body></html>
