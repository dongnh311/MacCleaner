<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>buttons</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Buttons</div>
  <div class="row" style="gap: 12px; flex-wrap: wrap;">
    <button style="background: var(--brand-accent); color: white; border: none; padding: 6px 14px; border-radius: 6px; font: 500 13px var(--font-sans);">Run Smart Care</button>
    <button style="background: rgba(255,255,255,0.08); color: var(--fg-primary); border: 0.5px solid var(--border-default); padding: 6px 14px; border-radius: 6px; font: 500 13px var(--font-sans);">Cancel</button>
    <button style="background: transparent; color: var(--brand-accent); border: none; padding: 6px 10px; font: 500 13px var(--font-sans);">Reveal in Finder</button>
    <button style="background: var(--color-danger); color: white; border: none; padding: 6px 14px; border-radius: 6px; font: 500 13px var(--font-sans);">Quarantine</button>
    <button style="background: transparent; color: var(--fg-secondary); border: 0.5px solid var(--border-default); padding: 5px 10px; border-radius: 6px; font: var(--type-body-sm);">⌥⌘0</button>
  </div>
</div></body></html>
