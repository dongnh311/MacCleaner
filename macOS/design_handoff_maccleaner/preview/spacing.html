<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>spacing</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Spacing scale · 8pt grid</div>
  <div class="row" style="gap: 10px; align-items: flex-end;">
    
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 2px; height: 2px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">xxs</div>
        <div class="token" style="color: var(--fg-quaternary);">2</div>
      </div>
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 4px; height: 4px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">xs</div>
        <div class="token" style="color: var(--fg-quaternary);">4</div>
      </div>
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 8px; height: 8px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">sm</div>
        <div class="token" style="color: var(--fg-quaternary);">8</div>
      </div>
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 12px; height: 12px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">md</div>
        <div class="token" style="color: var(--fg-quaternary);">12</div>
      </div>
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 16px; height: 16px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">lg</div>
        <div class="token" style="color: var(--fg-quaternary);">16</div>
      </div>
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 24px; height: 24px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">xl</div>
        <div class="token" style="color: var(--fg-quaternary);">24</div>
      </div>
      <div class="col" style="gap: 6px; align-items: center;">
        <div style="width: 32px; height: 32px; background: var(--brand-accent); border-radius: 2px;"></div>
        <div class="token">xxl</div>
        <div class="token" style="color: var(--fg-quaternary);">32</div>
      </div>
  </div>
</div></body></html>
