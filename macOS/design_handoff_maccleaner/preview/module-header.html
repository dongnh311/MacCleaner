<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>module-header</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding: 0; gap: 0;">
  <div style="padding: 12px 16px; display: flex; align-items: center; gap: 12px;">
    <div style="width: 56px; height: 56px; border-radius: 10px; background: linear-gradient(135deg, rgba(255,159,10,0.18), rgba(255,159,10,0.06)); border: 0.5px solid rgba(255,159,10,0.25); display: grid; place-items: center; color: #FF9F0A; font-size: 22px;">⌫</div>
    <div class="col" style="gap: 1px;">
      <div style="font: var(--type-title-md);">System Junk</div>
      <div style="font: 12px var(--font-sans); color: var(--fg-secondary);">Caches, logs, dev-tool junk</div>
    </div>
    <div class="spacer"></div>
    <button style="background: var(--color-warning); color: #000; border: none; padding: 6px 14px; border-radius: 6px; font: 500 13px var(--font-sans);">Scan</button>
  </div>
  <div style="height: 0.5px; background: var(--separator); margin: 0 16px;"></div>
  <div style="padding: 10px 16px; display: flex; align-items: center; gap: 8px;">
    <span class="chip" style="background: rgba(255,159,10,0.18); border-color: rgba(255,159,10,0.40); color: white;">All <span class="mono" style="color: var(--fg-tertiary);">128</span></span>
    <span class="chip">Caches</span>
    <span class="chip">Logs</span>
    <div class="spacer"></div>
    <span class="chip mono">⌘F</span>
  </div>
</div></body></html>
