<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>colors-semantic</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Semantic</div>
  <div class="row" style="gap: 14px; flex-wrap: wrap;">
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #30D158;"></div>
      <div class="label" style="color: var(--fg-primary);">Success</div>
      <div class="token">.systemGreen</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #FF9F0A;"></div>
      <div class="label" style="color: var(--fg-primary);">Warning</div>
      <div class="token">.systemOrange</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #FF453A;"></div>
      <div class="label" style="color: var(--fg-primary);">Danger</div>
      <div class="token">.systemRed</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #0A84FF;"></div>
      <div class="label" style="color: var(--fg-primary);">Info</div>
      <div class="token">.systemBlue</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #8E8E93;"></div>
      <div class="label" style="color: var(--fg-primary);">Neutral</div>
      <div class="token">.systemGray</div>
    </div></div>
</div></body></html>
