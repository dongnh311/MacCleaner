<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>colors-sections</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Sidebar section tints</div>
  <div class="row" style="gap: 14px; flex-wrap: wrap;">
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #6B52F5;"></div>
      <div class="label" style="color: var(--fg-primary);">Scan</div>
      <div class="token">.accentColor</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #FF9F0A;"></div>
      <div class="label" style="color: var(--fg-primary);">Cleanup</div>
      <div class="token">.systemOrange</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #FF453A;"></div>
      <div class="label" style="color: var(--fg-primary);">Protection</div>
      <div class="token">.systemRed</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #64D2FF;"></div>
      <div class="label" style="color: var(--fg-primary);">Performance</div>
      <div class="token">.systemTeal</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #5E5CE6;"></div>
      <div class="label" style="color: var(--fg-primary);">Applications</div>
      <div class="token">.systemIndigo</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #BF5AF2;"></div>
      <div class="label" style="color: var(--fg-primary);">Files</div>
      <div class="token">.systemPurple</div>
    </div>
    <div class="col" style="gap: 4px; min-width: 90px;">
      <div class="swatch" style="background: #FF375F;"></div>
      <div class="label" style="color: var(--fg-primary);">Tools</div>
      <div class="token">.systemPink</div>
    </div></div>
</div></body></html>
